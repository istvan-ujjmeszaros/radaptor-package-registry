name: Deploy Packages Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-packages-registry
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.PACKAGES_REGISTRY_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.PACKAGES_REGISTRY_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.PACKAGES_REGISTRY_DEPLOY_PORT }}
      REGISTRY_URL: https://packages.radaptor.com/registry.json
    steps:
      - name: Check deploy secrets
        id: secret_check
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER; do
            if [ -z "${!name:-}" ]; then
              echo "::warning::Missing required secret: ${name}"
              missing=1
            fi
          done
          if [ -z "${{ secrets.PACKAGES_REGISTRY_DEPLOY_SSH_KEY }}" ]; then
            echo "::warning::Missing required secret: PACKAGES_REGISTRY_DEPLOY_SSH_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.PACKAGES_REGISTRY_DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "::warning::Missing required secret: PACKAGES_REGISTRY_DEPLOY_KNOWN_HOSTS"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.secret_check.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.PACKAGES_REGISTRY_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PACKAGES_REGISTRY_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy VPS checkout
        if: steps.secret_check.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$port" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            '/var/www_config/packages.radaptor.com/update-repo.sh'

      - name: Validate deployed registry site on VPS
        if: steps.secret_check.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$port" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess

          registry_raw = subprocess.check_output(
              [
                  "docker",
                  "exec",
                  "packages.radaptor.com",
                  "wget",
                  "-qO-",
                  "http://127.0.0.1/registry.json",
              ],
              text=True,
          )
          catalog = json.loads(registry_raw)

          framework = catalog["packages"].get("radaptor/core/framework")
          if not framework:
              raise SystemExit("radaptor/core/framework missing from deployed registry catalog")

          latest = framework["latest"]
          dist_url = framework["versions"][latest]["dist"]["url"]
          artifact_path = "/" + dist_url.lstrip("/")
          subprocess.check_call(
              [
                  "docker",
                  "exec",
                  "packages.radaptor.com",
                  "wget",
                  "--spider",
                  "-q",
                  "http://127.0.0.1" + artifact_path,
              ]
          )

          print("Registry OK inside deployed container")
          print(f"Artifact OK inside deployed container: {artifact_path}")
          PY
          EOF

      - name: Skip deploy until secrets exist
        if: steps.secret_check.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Deploy skipped because repository secrets are not configured yet."
